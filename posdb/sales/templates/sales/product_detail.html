<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>Product Detail</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f0f4f8;
        }
        .card {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .badge {
            display: inline-block;
            padding: 5px 10px;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            font-size: 12px;
        }
        .price {
            font-size: 22px;
            color: green;
            margin: 10px 0;
        }
        .warning {
            color: red;
            font-weight: bold;
        }
        a {
            text-decoration: none;
            color: #007bff;
        }
        .product-img {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 16px;
            background: #f7f7f7;
        }
        .no-image {
            width: 100%;
            height: 200px;
            background: #f0f0f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 14px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

<div class="card">

    <!-- ✅ Product Image -->
    {% if product.image %}
        <img src="{{ product.image.url }}" alt="{{ product.name }}" class="product-img">
    {% else %}
        <div class="no-image">📷 No Image Available</div>
    {% endif %}

    <h2>{{ product.name }}</h2>

    <span class="badge">{{ product.category }}</span>

    <div class="price">USD $ {{ product.price }}</div>

    <p><strong>Barcode:</strong> {{ product.barcode }}</p>

    <p>
        <strong>Stock:</strong>
        {{ product.stock }}
        {% if product.stock < 10 %}
            <span class="warning">⚠️ (Low stock!)</span>
        {% endif %}
    </p>

    <p>
        <a href="{% url 'product_list' %}">← ត្រឡប់ទៅបញ្ជីផលិតផល</a>
    </p>

</div>

</body>
</html>
